<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8" />

<meta
  name="viewport"
  content="
    width=device-width,
    initial-scale=1,
    maximum-scale=1,
    user-scalable=no
  "
/>

<title>GoStop</title>

<style>

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,
body{

  margin:0;
  padding:0;

  width:100%;
  height:100%;

  overflow:hidden;

  background:#165c31;
  color:white;

  font-family:sans-serif;
}

/* =========================
   로비
========================= */

#lobby{

  width:100vw;
  height:100vh;

  display:flex;
  flex-direction:column;

  justify-content:center;
  align-items:center;

  gap:10px;
}

#lobby input{

  width:120px;

  padding:10px;

  border:none;
  border-radius:8px;

  text-align:center;

  font-size:18px;
}

#lobby button{

  padding:10px 14px;

  border:none;
  border-radius:8px;

  font-size:15px;
}

/* =========================
   게임 전체
========================= */

#game{

  display:none;

  width:100vw;
  height:100vh;

  overflow:hidden;

  padding:2px;

  display:flex;
  flex-direction:column;

  justify-content:space-between;
}

/* =========================
   상단
========================= */

#topBar{

  height:24px;

  display:flex;

  align-items:center;
  justify-content:space-between;

  flex-shrink:0;

  font-size:11px;
}

.topButtons{

  display:flex;
  gap:4px;
}

.smallBtn{

  font-size:9px;

  padding:2px 5px;

  border:none;
  border-radius:4px;
}

/* =========================
   섹션
========================= */

.section{

  width:100%;

  overflow:hidden;

  flex-shrink:0;
}

.sectionTitle{

  font-size:10px;

  font-weight:bold;

  margin-bottom:1px;

  line-height:10px;
}

/* =========================
   높이 비율
========================= */

#enemyCapturedSection{
  height:23vh;
}

#enemyHandSection{
  height:11vh;
}

#tableSection{
  height:13vh;
}

#myHandSection{
  height:13vh;
}

#myCapturedSection{
  height:23vh;
}

/* =========================
   줄
========================= */

.cardRow,
.captureRow{

  width:100%;

  display:flex;

  flex-wrap:nowrap;

  overflow:hidden;

  gap:1px;
}

/* =========================
   일반 카드
========================= */

.cardRow img{

  width:11vw;

  max-width:56px;

  height:auto;

  object-fit:contain;

  border-radius:4px;

  flex-shrink:1;
}

/* =========================
   먹은패 카드
========================= */

.captureRow img{

  width:9vw;

  max-width:46px;

  height:auto;

  object-fit:contain;

  border-radius:4px;

  flex-shrink:1;
}

/* 카드 많아질수록 자동축소 */

.captureRow img:nth-child(n+9){

  width:7.8vw;
}

.captureRow img:nth-child(n+13){

  width:6.8vw;
}

.captureRow img:nth-child(n+17){

  width:5.8vw;
}

/* =========================
   PC
========================= */

@media (min-width:701px){

  #game{

    max-width:1000px;

    margin:auto;
  }

  .cardRow img{

    width:56px;
  }

  .captureRow img{

    width:46px;
  }

  .captureRow img:nth-child(n+9){

    width:40px;
  }

  .captureRow img:nth-child(n+13){

    width:34px;
  }

  .captureRow img:nth-child(n+17){

    width:28px;
  }
}

</style>
</head>

<body>

<!-- =====================
     로비
===================== -->

<div id="lobby">

  <input
    id="roomInput"
    placeholder="방번호"
    maxlength="3"
  />

  <button onclick="joinRoom()">
    참가
  </button>

  <button onclick="playWithBot()">
    컴퓨터 대결
  </button>

</div>

<!-- =====================
     게임
===================== -->

<div id="game">

  <!-- 상단 -->

  <div id="topBar">

    <div id="turn">
      🟢 내 턴
    </div>

    <div id="deck">
      남은패 : 0
    </div>

    <div class="topButtons">

      <button
        class="smallBtn"
        onclick="location.reload()"
      >
        다시 시작
      </button>

      <button
        class="smallBtn"
        onclick="leaveGame()"
      >
        나가기
      </button>

    </div>

  </div>

  <!-- 상대 먹은패 -->

  <div
    class="section"
    id="enemyCapturedSection"
  >

    <div class="sectionTitle">
      상대 먹은패
    </div>

    <!-- 1줄 -->
    <div
      class="captureRow"
      id="enemyBrightAnimal"
    ></div>

    <!-- 2줄 -->
    <div
      class="captureRow"
      id="enemyRibbon"
    ></div>

    <!-- 3줄 -->
    <div
      class="captureRow"
      id="enemyJunk"
    ></div>

  </div>

  <!-- 상대패 -->

  <div
    class="section"
    id="enemyHandSection"
  >

    <div class="sectionTitle">
      상대패
    </div>

    <div
      class="cardRow"
      id="enemyHand"
    ></div>

  </div>

  <!-- 바닥패 -->

  <div
    class="section"
    id="tableSection"
  >

    <div class="sectionTitle">
      바닥패
    </div>

    <div
      class="cardRow"
      id="table"
    ></div>

  </div>

  <!-- 내패 -->

  <div
    class="section"
    id="myHandSection"
  >

    <div class="sectionTitle">
      내패
    </div>

    <div
      class="cardRow"
      id="hand"
    ></div>

  </div>

  <!-- 내가 먹은패 -->

  <div
    class="section"
    id="myCapturedSection"
  >

    <div class="sectionTitle">
      내가 먹은패
    </div>

    <!-- 1줄 -->
    <div
      class="captureRow"
      id="myBrightAnimal"
    ></div>

    <!-- 2줄 -->
    <div
      class="captureRow"
      id="myRibbon"
    ></div>

    <!-- 3줄 -->
    <div
      class="captureRow"
      id="myJunk"
    ></div>

  </div>

  <div id="winner"></div>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script src="app.js"></script>

</body>
</html>
