<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>고스톱</title>

<style>

body {
  margin: 0;
  overflow: hidden;
  background: #2f4f2f;
  color: white;
  font-family: sans-serif;
}

#wrap {
  width: 100vw;
  height: 100vh;
  box-sizing: border-box;
  padding: 6px;
}

/* ========================= */
/* 로비 */
/* ========================= */

#lobby {

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  width: 100%;
  height: 100%;

  gap: 10px;
}

button {

  width: 240px;
  padding: 12px;
  font-size: 18px;

  border: none;
  border-radius: 10px;

  cursor: pointer;

  transition: 0.2s;
}

button.active {

  background: #2ecc71;
  color: black;
  font-weight: bold;
}

#roomInput {

  width: 200px;
  padding: 12px;
  font-size: 22px;
  text-align: center;

  border-radius: 8px;
  border: none;
}

/* ========================= */
/* 게임 */
/* ========================= */

#game {

  display: none;

  width: 100%;
  height: 100vh;

  box-sizing: border-box;
}

/* ========================= */

.section {

  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 8px;

  padding: 4px;
  margin-bottom: 6px;
}

.title {

  font-size: 12px;
  margin-bottom: 2px;
}

.row {

  display: flex;
  gap: 2px;
  flex-wrap: nowrap;
  overflow-x: auto;
}

img {
  width: 44px;
}

/* 모바일 */
@media (max-width: 700px) {
  img { width: 36px; }
}

</style>

</head>

<body>

<div id="wrap">

<!-- ========================= -->
<!-- 로비 -->
<!-- ========================= -->

<div id="lobby">

  <button id="btn2" onclick="selectMode(2)">
    2인용 방 만들기
  </button>

  <button id="btn3" onclick="selectMode(3)">
    3인용 방 만들기
  </button>

  <button onclick="playWithBot()">
    컴퓨터 대결
  </button>

  <input id="roomInput" placeholder="방번호 입력">

  <button onclick="joinRoom()">
    방 참가
  </button>

</div>

<!-- ========================= -->
<!-- 게임 -->
<!-- ========================= -->

<div id="game">

  <div id="info"></div>

</div>

</div>

<script src="https://gostop-server.onrender.com/socket.io/socket.io.js"></script>
<script src="app.js"></script>

<script>

let selectedMode = null;
let readyRoomId = null;

/* =========================
   모드 선택 (방 만들기 전 상태)
========================= */

function selectMode(mode) {

  selectedMode = mode;

  readyRoomId = Math.floor(100 + Math.random() * 900);

  document.getElementById("roomInput").value = readyRoomId;

  // 버튼 상태 UI 변경

  document.getElementById("btn2").classList.remove("active");
  document.getElementById("btn3").classList.remove("active");

  if (mode === 2) {
    document.getElementById("btn2").classList.add("active");
    document.getElementById("btn2").innerText = "2인용 방 입장가능";
    document.getElementById("btn3").innerText = "3인용 방 만들기";
  }

  if (mode === 3) {
    document.getElementById("btn3").classList.add("active");
    document.getElementById("btn3").innerText = "3인용 방 입장가능";
    document.getElementById("btn2").innerText = "2인용 방 만들기";
  }
}

/* =========================
   방 참가 (실제 입장)
========================= */

function joinRoom() {

  const roomId =
    Number(document.getElementById("roomInput").value);

  if (!roomId) return;

  socket.emit("joinRoom", {

    roomId,
    mode: selectedMode || 2
  });

  document.getElementById("lobby").style.display = "none";
  document.getElementById("game").style.display = "block";
}

/* =========================
   컴퓨터
========================= */

function playWithBot() {

  selectedMode = 2;

  const roomId =
    Math.floor(100 + Math.random() * 900);

  document.getElementById("roomInput").value = roomId;

  socket.emit("joinRoom", {

    roomId,
    mode: 2,
    bot: true
  });

  document.getElementById("lobby").style.display = "none";
  document.getElementById("game").style.display = "block";
}

</script>

</body>

</html>
