<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, user-scalable=no"
>

<title>고스톱</title>

<style>

body {

  margin: 0;

  overflow: hidden;

  background: #2f4f2f;

  color: white;

  font-family: sans-serif;
}

/* ========================= */
/* 전체 */
/* ========================= */

#wrap {

  width: 100vw;

  height: 100vh;

  box-sizing: border-box;

  padding: 2px;
}

/* ========================= */
/* 입장 */
/* ========================= */

#lobby {

  display: flex;

  flex-direction: column;

  justify-content: center;

  align-items: center;

  width: 100%;

  height: 100%;

  gap: 10px;
}

#roomInput {

  width: 170px;

  padding: 10px;

  font-size: 20px;

  text-align: center;

  border-radius: 8px;

  border: none;
}

button {

  padding: 5px 10px;

  font-size: 13px;

  border: none;

  border-radius: 6px;

  cursor: pointer;
}

/* ========================= */
/* 게임 */
/* ========================= */

#game {

  display: none;

  width: 100%;

  height: 100%;

  box-sizing: border-box;

  padding: 2px;
}

/* ========================= */
/* 상단 정보 */
/* ========================= */

#topInfo {

  display: flex;

  justify-content: space-between;

  align-items: center;

  margin-bottom: 3px;

  padding: 0 2px;
}

#topInfo h3 {

  margin: 0;

  font-size: 14px;
}

/* ========================= */
/* 영역 */
/* ========================= */

.section {

  margin-bottom: 6px;

  border: 1px solid rgba(255,255,255,0.25);

  border-radius: 6px;

  padding: 2px;
}

.sectionTitle {

  margin: 0 0 1px 0;

  font-size: 13px;

  font-weight: bold;
}

/* ========================= */
/* 줄 */
/* ========================= */

.cardRow {

  display: flex;

  flex-wrap: nowrap;

  align-items: center;

  gap: 1px;

  min-height: 34px;

  overflow: hidden;

  margin-bottom: 1px;
}

/* ========================= */
/* 카드 */
/* ========================= */

img {

  width: 52px;

  user-select: none;

  -webkit-user-drag: none;

  touch-action: manipulation;
}

/* 먹은패 카드 */

.captureCard {

  width: 28px;
}

/* ========================= */
/* 모바일 */
/* ========================= */

@media (max-width: 700px) {

  #topInfo h3 {

    font-size: 11px;
  }

  .sectionTitle {

    font-size: 11px;
  }

  img {

    width: 39px;
  }

  .captureCard {

    width: 21px;
  }

  .cardRow {

    min-height: 24px;
  }

  #roomInput {

    width: 140px;

    font-size: 18px;
  }
}

</style>

</head>

<body>

<div id="wrap">

  <!-- ========================= -->
  <!-- 입장 -->
  <!-- ========================= -->

  <div id="lobby">

    <input
      id="roomInput"
      maxlength="3"
      placeholder="방번호 123"
    >

    <button onclick="joinRoom()">
      참가하기
    </button>

    <button onclick="playWithBot()">
      컴퓨터 대결
    </button>

  </div>

  <!-- ========================= -->
  <!-- 게임 -->
  <!-- ========================= -->

  <div id="game">

    <!-- 상단 -->
    <div id="topInfo">

      <h3 id="turn">
        대기중...
      </h3>

      <h3 id="deck">
        남은패 : 0
      </h3>

      <h3 id="winner"></h3>

    </div>

    <!-- ========================= -->
    <!-- 상대 먹은패 -->
    <!-- ========================= -->

    <div class="section">

      <div class="sectionTitle">
        상대 먹은패
      </div>

      <div id="enemyBright" class="cardRow"></div>

      <div id="enemyAnimal" class="cardRow"></div>

      <div id="enemyRibbon" class="cardRow"></div>

      <div id="enemyJunk" class="cardRow"></div>

    </div>

    <!-- ========================= -->
    <!-- 바닥패 -->
    <!-- ========================= -->

    <div class="section">

      <div class="sectionTitle">
        바닥패
      </div>

      <div id="table" class="cardRow"></div>

    </div>

    <!-- ========================= -->
    <!-- 내패 -->
    <!-- ========================= -->

    <div class="section">

      <div class="sectionTitle">
        내 패
      </div>

      <div id="hand" class="cardRow"></div>

    </div>

    <!-- ========================= -->
    <!-- 내가 먹은패 -->
    <!-- ========================= -->

    <div class="section">

      <div class="sectionTitle">
        내가 먹은패
      </div>

      <div id="myBright" class="cardRow"></div>

      <div id="myAnimal" class="cardRow"></div>

      <div id="myRibbon" class="cardRow"></div>

      <div id="myJunk" class="cardRow"></div>

    </div>

  </div>

</div>

<script src="https://gostop-server.onrender.com/socket.io/socket.io.js"></script>

<script src="app.js"></script>

</body>

</html>
