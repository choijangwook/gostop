<!DOCTYPE html>
button {
  padding: 8px 14px;
}

input {
  padding: 8px;
  width: 120px;
  text-align: center;
}

h3,h4,h5,p {
  margin: 2px;
}

@media (max-width: 700px) {

  img {
    width: 42px;
  }

  #playArea {
    gap: 4px;
  }
}
</style>
</head>

<body>

<div id="wrap">

  <div id="lobby">
    <input id="roomInput" maxlength="3" placeholder="123">
    <button onclick="joinRoom()">참가</button>
    <button onclick="playWithBot()">컴퓨터 대결</button>
  </div>

  <div id="game">

    <div id="topInfo">
      <h3 id="turn">대기중...</h3>
      <h3 id="deck">Deck : 0</h3>
      <h3 id="winner"></h3>
    </div>

    <div id="playArea">

      <div id="tableArea">
        <h4>Table</h4>
        <div id="table"></div>
      </div>

      <div id="handArea">
        <h4>My Hand</h4>
        <div id="hand"></div>
      </div>

    </div>

    <div id="capturedSection">
      <h4>Captured</h4>
      <div id="captured"></div>
    </div>

  </div>

</div>

<script src="https://gostop-server.onrender.com/socket.io/socket.io.js"></script>
<script src="app.js"></script>

</body>
</html>
