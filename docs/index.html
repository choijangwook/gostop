<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>GoStop</title>

<style>

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 0;
  overflow-x: hidden;
  font-family: sans-serif;
  background: #0b3d2e;
  color: white;
  touch-action: manipulation;
}

#wrap {
  width: 100%;
  max-width: 100vw;
  overflow-x: hidden;
  padding-bottom: 90px;
}

#top {
  padding: 10px;
  position: sticky;
  top: 0;
  background: #06281e;
  z-index: 10;
  font-weight: bold;
}

#controls {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  gap: 10px;
  padding: 10px;
  background: rgba(0,0,0,0.85);
  z-index: 99999;
}

button {
  flex: 1;
  max-width: 180px;
  padding: 14px;
  border: none;
  border-radius: 10px;
  background: #1f7a4c;
  color: white;
  font-weight: bold;
  font-size: 16px;
}

.section {
  padding: 10px;
  overflow-x: hidden;
}

.section h3 {
  margin: 6px 0;
  font-size: 16px;
}

.card-row {
  display: flex;
  flex-wrap: nowrap;
  overflow-x: auto;
  overflow-y: hidden;
  padding-bottom: 8px;
  min-height: 90px;
}

.card-row::-webkit-scrollbar {
  display: none;
}

.card {
  width: 55px;
  height: 80px;
  object-fit: cover;
  border-radius: 6px;
  flex-shrink: 0;
  background: white;
  margin-left: -18px;
}

.card:first-child {
  margin-left: 0;
}

#table {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  min-height: 90px;
}

#table .card {
  margin-left: 0;
}

@media (max-width: 600px) {

  .card {
    width: 46px;
    height: 68px;
  }

  button {
    font-size: 15px;
    padding: 12px;
  }
}

</style>
</head>

<body>

<div id="wrap">

  <div id="top">
    <div id="turnInfo">연결중...</div>
  </div>

  <div class="section">
    <h3>상대 먹은패</h3>
    <div id="opponentCaptured" class="card-row"></div>
  </div>

  <div class="section">
    <h3>테이블</h3>
    <div id="table"></div>
  </div>

  <div class="section">
    <h3>내 패</h3>
    <div id="hand" class="card-row"></div>
  </div>

  <div class="section">
    <h3>내 먹은패</h3>
    <div id="captured" class="card-row"></div>
  </div>

</div>

<div id="controls">
  <button onclick="restartGame()">다시하기</button>
  <button onclick="leaveRoom()">나가기</button>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>

// 🔥 여기만 네 PC IPv4 주소로 수정
const socket = io("http://192.168.219.103:10000");

let roomId = "room1";

let roles = {};
let myRole = null;
let turn = null;
let isMyTurn = false;

socket.on("connect", () => {

  socket.emit("joinRoom", {
    roomId
  });

});

socket.on("stateUpdate", (data) => {

  roles = data.roles || {};
  turn = data.turn;

  myRole = roles[socket.id];

  if (!myRole) return;

  isMyTurn = (myRole === turn);

  document.getElementById("turnInfo").innerText =
    isMyTurn ? "🟢 내 턴" : "🔴 상대 턴";

  render(data);
});

function playCard(card) {

  if (!isMyTurn) return;

  socket.emit("playCard", {
    roomId,
    card
  });
}

function restartGame() {

  socket.emit("restart", {
    roomId
  });
}

function leaveRoom() {

  socket.emit("leaveRoom", {
    roomId
  });

  location.reload();
}

function createCard(card, clickable = false) {

  const img = document.createElement("img");

  img.className = "card";

  img.src = `images/${card}`;

  img.draggable = false;

  img.onerror = () => {
    img.style.background = "white";
  };

  if (clickable) {
    img.onclick = () => playCard(card);
  }

  return img;
}

function render(data) {

  renderHand(data.hands?.[socket.id] || []);
  renderTable(data.table || []);
  renderCaptured(data.captured?.[socket.id] || []);

  const opp = Object.keys(data.roles || {})
    .filter(id => id !== socket.id)
    .map(id => data.captured[id] || [])
    .flat();

  renderOpponent(opp);
}

function renderHand(cards) {

  const el = document.getElementById("hand");

  el.innerHTML = "";

  cards.forEach(card => {
    el.appendChild(createCard(card, true));
  });
}

function renderTable(cards) {

  const el = document.getElementById("table");

  el.innerHTML = "";

  cards.forEach(card => {
    el.appendChild(createCard(card));
  });
}

function renderCaptured(cards) {

  const el = document.getElementById("captured");

  el.innerHTML = "";

  cards.forEach(card => {
    el.appendChild(createCard(card));
  });
}

function renderOpponent(cards) {

  const el = document.getElementById("opponentCaptured");

  el.innerHTML = "";

  cards.forEach(card => {
    el.appendChild(createCard(card));
  });
}

</script>

</body>
</html>
