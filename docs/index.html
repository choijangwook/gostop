<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, user-scalable=no"
>

<title>고스톱</title>

<style>

body {

  margin: 0;

  overflow: hidden;

  background: #2f4f2f;

  color: white;

  font-family: sans-serif;
}

/* ========================= */
/* 전체 */
/* ========================= */

#wrap {

  display: flex;

  flex-direction: column;

  align-items: center;

  justify-content: flex-start;

  width: 100vw;

  height: 100vh;

  box-sizing: border-box;

  padding: 4px;
}

/* ========================= */
/* 입장 */
/* ========================= */

#lobby {

  display: flex;

  flex-direction: column;

  align-items: center;

  justify-content: center;

  width: 100%;

  height: 100vh;

  gap: 14px;
}

#roomInput {

  width: 180px;

  padding: 12px;

  font-size: 22px;

  text-align: center;

  border-radius: 8px;

  border: none;
}

button {

  padding: 12px 22px;

  font-size: 18px;

  border: none;

  border-radius: 8px;

  cursor: pointer;
}

/* ========================= */
/* 게임 화면 */
/* ========================= */

#game {

  display: none;

  width: 100%;

  height: 100%;

  box-sizing: border-box;
}

#topInfo {

  display: flex;

  justify-content: space-between;

  align-items: center;

  margin-bottom: 4px;
}

#topInfo h3 {

  margin: 0;

  font-size: 16px;
}

/* ========================= */
/* 상대 먹은패 */
/* ========================= */

#enemyCapturedSection {

  width: 100%;

  margin-bottom: 4px;
}

/* ========================= */
/* 바닥패 */
/* ========================= */

#tableSection {

  width: 100%;

  margin-bottom: 4px;
}

#table {

  display: flex;

  flex-wrap: nowrap;

  justify-content: center;

  gap: 3px;

  overflow: hidden;

  min-height: 68px;
}

/* ========================= */
/* 내 패 */
/* ========================= */

#handSection {

  width: 100%;

  margin-bottom: 4px;
}

#hand {

  display: flex;

  flex-wrap: nowrap;

  justify-content: center;

  gap: 3px;

  overflow: hidden;

  min-height: 68px;
}

/* ========================= */
/* 내 먹은패 */
/* ========================= */

#myCapturedSection {

  width: 100%;
}

/* ========================= */
/* 먹은패 공통 */
/* ========================= */

.playerCaptured {

  border: 1px solid rgba(255,255,255,0.25);

  border-radius: 6px;

  padding: 3px;

  margin-bottom: 4px;
}

.capturedRow {

  display: flex;

  flex-wrap: wrap;

  gap: 2px;

  min-height: 34px;
}

/* ========================= */
/* 카드 */
/* ========================= */

img {

  width: 58px;

  user-select: none;

  -webkit-user-drag: none;

  touch-action: manipulation;
}

.capturedRow img {

  width: 34px;
}

/* ========================= */
/* 제목 */
/* ========================= */

h4,
h5 {

  margin: 2px;

  font-size: 14px;
}

/* ========================= */
/* 모바일 */
/* ========================= */

@media (max-width: 700px) {

  #wrap {

    padding: 2px;
  }

  img {

    width: 41px;
  }

  .capturedRow img {

    width: 25px;
  }

  h4,
  h5 {

    font-size: 12px;
  }

  #topInfo h3 {

    font-size: 13px;
  }

  #table,
  #hand {

    min-height: 52px;
  }
}

</style>

</head>

<body>

<div id="wrap">

  <!-- ========================= -->
  <!-- 입장 화면 -->
  <!-- ========================= -->

  <div id="lobby">

    <input
      id="roomInput"
      maxlength="3"
      placeholder="방번호 123"
    >

    <button onclick="joinRoom()">
      참가
    </button>

    <button onclick="playWithBot()">
      컴퓨터 대결
    </button>

  </div>

  <!-- ========================= -->
  <!-- 게임 -->
  <!-- ========================= -->

  <div id="game">

    <!-- 상단 -->
    <div id="topInfo">

      <h3 id="turn">
        대기중...
      </h3>

      <h3 id="deck">
        남은패 : 0
      </h3>

      <h3 id="winner"></h3>

    </div>

    <!-- 상대 먹은패 -->
    <div id="enemyCapturedSection">

      <h4>상대 먹은패</h4>

      <div id="enemyCaptured"></div>

    </div>

    <!-- 바닥패 -->
    <div id="tableSection">

      <h4>바닥패</h4>

      <div id="table"></div>

    </div>

    <!-- 내패 -->
    <div id="handSection">

      <h4>내 패</h4>

      <div id="hand"></div>

    </div>

    <!-- 내 먹은패 -->
    <div id="myCapturedSection">

      <h4>내 먹은패</h4>

      <div id="myCaptured"></div>

    </div>

  </div>

</div>

<script src="https://gostop-server.onrender.com/socket.io/socket.io.js"></script>

<script src="app.js"></script>

</body>

</html>
