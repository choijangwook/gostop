<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, user-scalable=no"
>

<title>고스톱</title>

<style>

body {

  margin: 0;

  overflow: hidden;

  background: #2f4f2f;

  color: white;

  font-family: sans-serif;
}

#wrap {

  width: 100vw;

  height: 100vh;

  box-sizing: border-box;

  padding: 2px;
}

/* ========================= */
/* 입장 */
/* ========================= */

#lobby {

  display: flex;

  flex-direction: column;

  justify-content: center;

  align-items: center;

  width: 100%;

  height: 100%;

  gap: 10px;
}

#roomInput {

  width: 170px;

  padding: 12px;

  font-size: 22px;

  text-align: center;

  border-radius: 8px;

  border: none;
}

button {

  padding: 10px 18px;

  font-size: 17px;

  border: none;

  border-radius: 8px;

  cursor: pointer;
}

.modeButtons {

  display: flex;

  gap: 8px;
}

/* ========================= */
/* 게임 */
/* ========================= */

#game {

  display: none;

  width: 100%;

  height: 100%;

  box-sizing: border-box;

  padding: 2px;
}

#topInfo {

  display: flex;

  justify-content: space-between;

  align-items: center;

  margin-bottom: 3px;
}

#topInfo h3 {

  margin: 0;

  font-size: 13px;
}

/* ========================= */
/* 공통 섹션 */
/* ========================= */

.section {

  border: 1px solid rgba(255,255,255,0.25);

  border-radius: 6px;

  padding: 2px;

  margin-bottom: 6px;
}

.sectionTitle {

  margin: 0 0 1px 0;

  font-size: 12px;

  font-weight: bold;
}

/* ========================= */
/* 카드 줄 */
/* ========================= */

.cardRow {

  display: flex;

  flex-wrap: nowrap;

  gap: 1px;

  overflow: hidden;

  min-height: 32px;

  margin-bottom: 1px;
}

/* ========================= */
/* 카드 */
/* ========================= */

img {

  width: 50px;

  user-select: none;

  -webkit-user-drag: none;

  touch-action: manipulation;
}

.captureCard {

  width: 26px;
}

/* ========================= */
/* 모바일 */
/* ========================= */

@media (max-width: 700px) {

  img {

    width: 38px;
  }

  .captureCard {

    width: 20px;
  }

  .sectionTitle {

    font-size: 11px;
  }

  #topInfo h3 {

    font-size: 10px;
  }
}

</style>

</head>

<body>

<div id="wrap">

  <!-- ========================= -->
  <!-- 입장 -->
  <!-- ========================= -->

  <div id="lobby">

    <input
      id="roomInput"
      maxlength="3"
      placeholder="방번호 123"
    >

    <button onclick="joinRoom()">
      참가
    </button>

    <div class="modeButtons">

      <button onclick="setMode(2)">
        2인용
      </button>

      <button onclick="setMode(3)">
        3인용
      </button>

    </div>

    <button onclick="playWithBot()">
      컴퓨터 대결
    </button>

  </div>

  <!-- ========================= -->
  <!-- 게임 -->
  <!-- ========================= -->

  <div id="game">

    <!-- 상단 -->
    <div id="topInfo">

      <h3 id="turn">
        대기중...
      </h3>

      <h3 id="deck">
        남은패 : 0
      </h3>

      <h3 id="winner"></h3>

    </div>

    <!-- ========================= -->
    <!-- 1번 상대 먹은패 -->
    <!-- ========================= -->

    <div class="section">

      <div class="sectionTitle">
        1번 상대 먹은패
      </div>

      <div id="enemy1Bright" class="cardRow"></div>
      <div id="enemy1Animal" class="cardRow"></div>
      <div id="enemy1Ribbon" class="cardRow"></div>
      <div id="enemy1Junk" class="cardRow"></div>

    </div>

    <!-- ========================= -->
    <!-- 2번 상대 먹은패 -->
    <!-- ========================= -->

    <div class="section">

      <div class="sectionTitle">
        2번 상대 먹은패
      </div>

      <div id="enemy2Bright" class="cardRow"></div>
      <div id="enemy2Animal" class="cardRow"></div>
      <div id="enemy2Ribbon" class="cardRow"></div>
      <div id="enemy2Junk" class="cardRow"></div>

    </div>

    <!-- ========================= -->
    <!-- 바닥패 -->
    <!-- ========================= -->

    <div class="section">

      <div class="sectionTitle">
        바닥패
      </div>

      <div id="table" class="cardRow"></div>

    </div>

    <!-- ========================= -->
    <!-- 내패 -->
    <!-- ========================= -->

    <div class="section">

      <div class="sectionTitle">
        내 패
      </div>

      <div id="hand" class="cardRow"></div>

    </div>

    <!-- ========================= -->
    <!-- 내 먹은패 -->
    <!-- ========================= -->

    <div class="section">

      <div class="sectionTitle">
        내 먹은패
      </div>

      <div id="myBright" class="cardRow"></div>
      <div id="myAnimal" class="cardRow"></div>
      <div id="myRibbon" class="cardRow"></div>
      <div id="myJunk" class="cardRow"></div>

    </div>

  </div>

</div>

<script>

let playerMode = 2;

function setMode(mode) {

  playerMode = mode;

  alert(mode + "인용 선택");
}

</script>

<script src="https://gostop-server.onrender.com/socket.io/socket.io.js"></script>

<script src="app.js"></script>

</body>

</html>
