<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>

body {
  margin: 0;
  overflow: hidden;
  font-family: sans-serif;
  background: #f3f3f3;
}

/* 🔥 전체 중앙 + 아래로 살짝 내림 */
#wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;

  padding-top: 60px; /* ← 핵심 (room 안 잘림) */
  height: 100vh;
  box-sizing: border-box;
}

#lobby {
  margin-bottom: 20px;
}

#game {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 100%;
  max-width: 500px;
  align-items: center;
}

#table, #hand, #captured {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 6px;
}

img {
  width: 60px;
  user-select: none;
  -webkit-user-drag: none;
  touch-action: manipulation;
}

#hand img {
  width: 65px;
}

#captured img {
  width: 35px;
  opacity: 0.8;
}

button {
  padding: 10px;
}

</style>
</head>

<body>

<div id="wrap">

<div id="lobby">
  <input id="roomInput" placeholder="3자리 방번호">
  <button onclick="joinRoom()">참가</button>
</div>

<div id="game">

  <h4>Table</h4>
  <div id="table"></div>

  <h4>My Hand</h4>
  <div id="hand"></div>

  <h4>Captured</h4>
  <div id="captured"></div>

</div>

</div>

<script src="https://gostop-server.onrender.com/socket.io/socket.io.js"></script>
<script src="app.js"></script>

</body>
</html>
