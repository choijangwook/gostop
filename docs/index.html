<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />

<meta name="viewport"
  content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
/>

<title>GoStop</title>

<style>
/* 기존 그대로 유지 */
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#165c31;color:white;font-family:sans-serif;}
#lobby{width:100vw;height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:8px;}
#lobby input{width:120px;padding:10px;border:none;border-radius:8px;text-align:center;font-size:18px;}
#lobby button{padding:8px 12px;border:none;border-radius:8px;font-size:14px;}
#game{display:none;width:100vw;height:100vh;overflow:hidden;padding:2px;flex-direction:column;}
#topBar{height:22px;display:flex;justify-content:space-between;align-items:center;font-size:10px;flex-shrink:0;}
.topButtons{display:flex;gap:2px;}
.smallBtn{font-size:8px;padding:1px 4px;border:none;border-radius:4px;}
.section{width:100%;overflow:hidden;flex-shrink:0;}
.sectionTitle{font-size:9px;font-weight:bold;line-height:10px;margin:0;opacity:0.92;}
#enemyCapturedSection{height:23vh;}
#enemyHandSection{height:11vh;}
#tableSection{height:12vh;}
#myHandSection{height:12vh;}
#myCapturedSection{height:23vh;}
.cardRow{display:flex;flex-wrap:nowrap;overflow:hidden;align-items:center;height:calc(100% - 10px);}
.cardRow img{width:11vw;max-width:52px;min-width:24px;object-fit:contain;border-radius:3px;}
.captureWrap{height:calc(100% - 10px);display:flex;flex-direction:column;}
.captureRow{display:flex;flex-wrap:nowrap;overflow:hidden;height:33%;}
.captureRow img{width:8.2vw;max-width:40px;min-width:22px;object-fit:contain;border-radius:3px;}
</style>

</head>

<body>

<div id="lobby">
  <input id="roomInput" placeholder="방번호" maxlength="3"/>
  <button onclick="joinRoom()">참가</button>
  <button onclick="playWithBot()">컴퓨터 대결</button>
</div>

<div id="game">

  <div id="topBar">
    <div id="turn">🟢 내 턴</div>
    <div id="deck">남은패 : 0</div>
    <div class="topButtons">
      <button class="smallBtn" onclick="restartGame()">다시 시작</button>
      <button class="smallBtn" onclick="leaveGame()">나가기</button>
    </div>
  </div>

  <div id="enemyCapturedSection">
    <div class="sectionTitle">상대 먹은패</div>
    <div class="captureWrap">
      <div class="captureRow" id="enemyBrightAnimal"></div>
      <div class="captureRow" id="enemyRibbon"></div>
      <div class="captureRow" id="enemyJunk"></div>
    </div>
  </div>

  <div id="enemyHandSection">
    <div class="sectionTitle">상대패</div>
    <div class="cardRow" id="enemyHand"></div>
  </div>

  <div id="tableSection">
    <div class="sectionTitle">바닥패</div>
    <div class="cardRow" id="table"></div>
  </div>

  <div id="myHandSection">
    <div class="sectionTitle">내패</div>
    <div class="cardRow" id="hand"></div>
  </div>

  <div id="myCapturedSection">
    <div class="sectionTitle">내가 먹은패</div>
    <div class="captureWrap">
      <div class="captureRow" id="myBrightAnimal"></div>
      <div class="captureRow" id="myRibbon"></div>
      <div class="captureRow" id="myJunk"></div>
    </div>
  </div>

</div>

<!-- ✅ 핵심 수정: socket.io 올바른 경로 -->
<script src="/socket.io/socket.io.js"></script>

<!-- share-modal 제거 (에러 원인) -->
<!-- <script src="share-modal.js"></script> -->

<script src="app.js"></script>

</body>
</html>
