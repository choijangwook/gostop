<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Gostop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 🔥 외부 스크립트 강제 차단 -->
  <script>
    const _create = document.createElement;
    document.createElement = function(tag) {
      const el = _create.call(document, tag);
      if (tag === 'script') {
        Object.defineProperty(el, 'src', {
          set(value) {
            if (value && value.includes('share-modal')) {
              console.warn('차단됨:', value);
              return;
            }
            el.setAttribute('src', value);
          }
        });
      }
      return el;
    };
  </script>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🎴 Gostop</h1>

<div>
  <button onclick="createRoom()">방 만들기</button>
  <input id="roomInput" placeholder="방 코드">
  <button onclick="joinRoom()">참가</button>
</div>

<div id="status"></div>
<div id="game"></div>

<script src="https://gostop-server.onrender.com/socket.io/socket.io.js"></script>
<script src="app.js"></script>

</body>
</html>
