<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8" />

<meta
  name="viewport"
  content="
    width=device-width,
    initial-scale=1,
    maximum-scale=1,
    user-scalable=no
  "
/>

<title>GoStop</title>

<style>

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,
body{

  margin:0;
  padding:0;

  width:100%;
  height:100%;

  overflow:hidden;

  background:#165c31;
  color:white;

  font-family:sans-serif;
}

/* =========================
   로비
========================= */

#lobby{

  width:100vw;
  height:100vh;

  display:flex;
  flex-direction:column;

  justify-content:center;
  align-items:center;

  gap:8px;
}

#lobby input{

  width:120px;

  padding:9px;

  border:none;
  border-radius:8px;

  text-align:center;

  font-size:18px;
}

#lobby button{

  padding:8px 12px;

  border:none;
  border-radius:8px;

  font-size:14px;
}

/* =========================
   게임 전체
========================= */

#game{

  display:none;

  width:100vw;
  height:100vh;

  overflow:hidden;

  padding:2px;

  display:flex;
  flex-direction:column;
}

/* =========================
   상단
========================= */

#topBar{

  height:22px;

  display:flex;

  justify-content:space-between;
  align-items:center;

  font-size:10px;

  flex-shrink:0;

  overflow:hidden;
}

.topButtons{

  display:flex;
  gap:2px;
}

.smallBtn{

  font-size:8px;

  padding:1px 4px;

  border:none;
  border-radius:4px;
}

/* =========================
   공통 섹션
========================= */

.section{

  width:100%;

  overflow:hidden;

  flex-shrink:0;
}

.sectionTitle{

  height:10px;

  line-height:10px;

  font-size:9px;

  font-weight:bold;

  margin:0;

  opacity:0.92;
}

/* =========================
   영역 높이 고정
========================= */

#enemyCapturedSection{

  height:24vh;
}

#enemyHandSection{

  height:11vh;
}

#tableSection{

  height:12vh;
}

#myHandSection{

  height:12vh;
}

#myCapturedSection{

  height:24vh;
}

/* =========================
   일반 카드줄
========================= */

.cardRow{

  display:flex;

  flex-wrap:nowrap;

  overflow:hidden;

  height:calc(100% - 10px);
}

.cardRow img{

  width:11vw;

  max-width:52px;

  height:auto;

  object-fit:contain;

  border-radius:3px;

  flex-shrink:1;
}

/* =========================
   먹은패
========================= */

.captureWrap{

  height:calc(100% - 10px);

  display:flex;
  flex-direction:column;

  overflow:hidden;
}

/* 각 줄 */

.captureRow{

  display:flex;

  flex-wrap:nowrap;

  overflow:hidden;

  height:33%;
}

/* 세로 겹침 */

.captureRow + .captureRow{

  margin-top:-12px;
}

/* 카드 */

.captureRow img{

  width:8.2vw;

  max-width:40px;

  height:auto;

  object-fit:contain;

  border-radius:3px;

  flex:0 0 auto;

  margin-left:-10px;
}

/* 첫 카드 */

.captureRow img:first-child{

  margin-left:0;
}

/* 카드 많아질수록 자동 축소 */

.captureRow img:nth-child(n+9){

  width:7vw;
}

.captureRow img:nth-child(n+13){

  width:6vw;
}

.captureRow img:nth-child(n+17){

  width:5vw;
}

/* =========================
   구분선
========================= */

.separator{

  height:1px;

  background:
    rgba(255,255,255,0.15);

  flex-shrink:0;
}

/* =========================
   PC
========================= */

@media (min-width:701px){

  #game{

    max-width:1000px;

    margin:auto;
  }

  #enemyCapturedSection{

    height:220px;
  }

  #enemyHandSection{

    height:88px;
  }

  #tableSection{

    height:96px;
  }

  #myHandSection{

    height:96px;
  }

  #myCapturedSection{

    height:220px;
  }

  .cardRow img{

    width:54px;
  }

  .captureRow img{

    width:40px;

    margin-left:-12px;
  }

  .captureRow + .captureRow{

    margin-top:-16px;
  }

  .captureRow img:nth-child(n+9){

    width:35px;
  }

  .captureRow img:nth-child(n+13){

    width:30px;
  }

  .captureRow img:nth-child(n+17){

    width:25px;
  }

  #topBar{

    font-size:11px;
  }

  .sectionTitle{

    font-size:10px;
  }

  .smallBtn{

    font-size:9px;
  }
}

</style>
</head>

<body>

<!-- =====================
     로비
===================== -->

<div id="lobby">

  <input
    id="roomInput"
    placeholder="방번호"
    maxlength="3"
  />

  <button onclick="joinRoom()">
    참가
  </button>

  <button onclick="playWithBot()">
    컴퓨터 대결
  </button>

</div>

<!-- =====================
     게임
===================== -->

<div id="game">

  <!-- 상단 -->

  <div id="topBar">

    <div id="turn">
      🟢 내 턴
    </div>

    <div id="deck">
      남은패 : 0
    </div>

    <div class="topButtons">

      <button
        class="smallBtn"
        onclick="location.reload()"
      >
        다시 시작
      </button>

      <button
        class="smallBtn"
        onclick="leaveGame()"
      >
        나가기
      </button>

    </div>

  </div>

  <!-- 상대 먹은패 -->

  <div
    class="section"
    id="enemyCapturedSection"
  >

    <div class="sectionTitle">
      상대 먹은패
    </div>

    <div class="captureWrap">

      <div
        class="captureRow"
        id="enemyBrightAnimal"
      ></div>

      <div
        class="captureRow"
        id="enemyRibbon"
      ></div>

      <div
        class="captureRow"
        id="enemyJunk"
      ></div>

    </div>

  </div>

  <div class="separator"></div>

  <!-- 상대패 -->

  <div
    class="section"
    id="enemyHandSection"
  >

    <div class="sectionTitle">
      상대패
    </div>

    <div
      class="cardRow"
      id="enemyHand"
    ></div>

  </div>

  <div class="separator"></div>

  <!-- 바닥패 -->

  <div
    class="section"
    id="tableSection"
  >

    <div class="sectionTitle">
      바닥패
    </div>

    <div
      class="cardRow"
      id="table"
    ></div>

  </div>

  <div class="separator"></div>

  <!-- 내패 -->

  <div
    class="section"
    id="myHandSection"
  >

    <div class="sectionTitle">
      내패
    </div>

    <div
      class="cardRow"
      id="hand"
    ></div>

  </div>

  <div class="separator"></div>

  <!-- 내가 먹은패 -->

  <div
    class="section"
    id="myCapturedSection"
  >

    <div class="sectionTitle">
      내가 먹은패
    </div>

    <div class="captureWrap">

      <div
        class="captureRow"
        id="myBrightAnimal"
      ></div>

      <div
        class="captureRow"
        id="myRibbon"
      ></div>

      <div
        class="captureRow"
        id="myJunk"
      ></div>

    </div>

  </div>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="app.js"></script>

</body>
</html>
