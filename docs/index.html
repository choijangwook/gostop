<!DOCTYPE html>
<html lang="ko">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>고스톱</title>

<style>

body {
  margin: 0;
  background: #2f4f2f;
  color: white;
  font-family: sans-serif;
}

#lobby, #game {
  width: 100vw;
  height: 100vh;
}

#lobby {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 10px;
}

#game {
  display: none;
  padding: 6px;
  box-sizing: border-box;
}

/* 버튼 */
button {
  width: 220px;
  padding: 12px;
  font-size: 18px;
  border: none;
  border-radius: 8px;
}

button.active {
  background: #2ecc71;
  color: black;
}

/* 카드 영역 */
.section {
  border: 1px solid rgba(255,255,255,0.2);
  margin-bottom: 6px;
  padding: 4px;
  border-radius: 6px;
}

.title {
  font-size: 12px;
  margin-bottom: 2px;
}

.row {
  display: flex;
  gap: 2px;
  flex-wrap: wrap;
}

img {
  width: 40px;
}

</style>

</head>

<body>

<!-- ===================== -->
<!-- 로비 -->
<!-- ===================== -->
<div id="lobby">

  <button id="btn2" onclick="selectMode(2)">2인용 방 만들기</button>
  <button id="btn3" onclick="selectMode(3)">3인용 방 만들기</button>

  <input id="roomInput" placeholder="방번호 입력">

  <button onclick="joinRoom()">방 참가</button>

</div>

<!-- ===================== -->
<!-- 게임 -->
<!-- ===================== -->
<div id="game">

  <div id="status"></div>

  <div class="section">
    <div class="title">바닥패</div>
    <div id="table" class="row"></div>
  </div>

  <div class="section">
    <div class="title">내 패</div>
    <div id="hand" class="row"></div>
  </div>

  <div class="section">
    <div class="title">내가 먹은패</div>
    <div id="captured" class="row"></div>
  </div>

</div>

<script src="https://gostop-server.onrender.com/socket.io/socket.io.js"></script>

<script src="app.js"></script>

<script>

let selectedMode = 2;

function selectMode(mode) {

  selectedMode = mode;

  document.getElementById("btn2").classList.remove("active");
  document.getElementById("btn3").classList.remove("active");

  document.getElementById("btn" + mode).classList.add("active");
}

function joinRoom() {

  const roomId =
    Number(document.getElementById("roomInput").value);

  if (!roomId) return;

  socket.emit("joinRoom", {
    roomId,
    mode: selectedMode
  });

  document.getElementById("lobby").style.display = "none";
  document.getElementById("game").style.display = "block";
}

</script>

</body>

</html>
