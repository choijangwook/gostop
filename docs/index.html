<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta
  name="viewport"
  content="
    width=device-width,
    initial-scale=1,
    maximum-scale=1,
    user-scalable=no
  "
/>

<title>GoStop</title>

<style>

html,
body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;

  background:#165c31;
  color:white;

  font-family:sans-serif;
}

/* =========================
   로비
========================= */

#lobby{
  width:100%;
  height:100vh;

  display:flex;
  flex-direction:column;

  justify-content:center;
  align-items:center;

  gap:10px;
}

#lobby input{

  width:130px;

  padding:10px;

  border:none;
  border-radius:8px;

  text-align:center;

  font-size:18px;
}

#lobby button{

  padding:10px 16px;

  border:none;
  border-radius:8px;

  font-size:16px;
}

/* =========================
   게임화면
========================= */

#game{

  display:none;

  width:100vw;
  height:100vh;

  overflow:hidden;

  box-sizing:border-box;

  padding:2px;
}

/* =========================
   상태
========================= */

#topBar{

  display:flex;

  justify-content:space-between;
  align-items:center;

  font-size:13px;

  margin-bottom:2px;
}

.smallBtn{

  font-size:11px;

  padding:2px 6px;

  border:none;
  border-radius:5px;
}

/* =========================
   섹션
========================= */

.section{

  margin-bottom:5px;
}

.sectionTitle{

  font-size:12px;

  margin-bottom:1px;

  font-weight:bold;
}

/* =========================
   카드줄
========================= */

.cardRow{

  display:flex;

  flex-wrap:nowrap;

  gap:1px;

  min-height:58px;

  overflow:hidden;
}

/* =========================
   먹은패 전용 3줄
========================= */

.captureRow{

  display:flex;

  flex-wrap:nowrap;

  gap:1px;

  min-height:42px;

  margin-bottom:1px;

  overflow:hidden;
}

/* =========================
   카드
========================= */

img{

  width:48px;

  height:auto;

  object-fit:contain;

  border-radius:4px;
}

/* =========================
   2인용 / 3인용
========================= */

body.twoPlayer img,
body.threePlayer img{

  width:54px;
}

/* =========================
   모바일
========================= */

@media (max-width:700px){

  #game{

    padding:1px;
  }

  .section{

    margin-bottom:3px;
  }

  .sectionTitle{

    font-size:11px;

    margin-bottom:0;
  }

  img{

    width:18vw;

    max-width:72px;
  }

  body.twoPlayer img{

    width:21vw;
    max-width:86px;
  }

  body.threePlayer img{

    width:18vw;
    max-width:74px;
  }

  #topBar{

    font-size:11px;
  }

  .smallBtn{

    font-size:10px;

    padding:1px 5px;
  }

  .cardRow{

    min-height:20vw;
  }

  .captureRow{

    min-height:14vw;
  }
}

</style>
</head>

<body>

<!-- =====================
     로비
===================== -->

<div id="lobby">

  <input
    id="roomInput"
    placeholder="방번호"
    maxlength="3"
  />

  <button onclick="joinRoom()">
    참가
  </button>

  <button onclick="playWithBot()">
    컴퓨터 대결
  </button>

</div>

<!-- =====================
     게임
===================== -->

<div id="game">

  <!-- 상태 -->

  <div id="topBar">

    <div id="turn">
      대기중...
    </div>

    <div id="deck">
      남은패 : 0
    </div>

    <button
      class="smallBtn"
      onclick="leaveGame()"
    >
      나가기
    </button>

  </div>

  <!-- 상대 먹은패 -->

  <div class="section">

    <div class="sectionTitle">
      상대 먹은패
    </div>

    <!-- 1줄 -->
    <div
      class="captureRow"
      id="enemyBrightAnimal"
    ></div>

    <!-- 2줄 -->
    <div
      class="captureRow"
      id="enemyRibbon"
    ></div>

    <!-- 3줄 -->
    <div
      class="captureRow"
      id="enemyJunk"
    ></div>

  </div>

  <!-- 상대 패 -->

  <div class="section">

    <div class="sectionTitle">
      상대패
    </div>

    <div
      class="cardRow"
      id="enemyHand"
    ></div>

  </div>

  <!-- 바닥패 -->

  <div class="section">

    <div class="sectionTitle">
      바닥패
    </div>

    <div
      class="cardRow"
      id="table"
    ></div>

  </div>

  <!-- 내 패 -->

  <div class="section">

    <div class="sectionTitle">
      내패
    </div>

    <div
      class="cardRow"
      id="hand"
    ></div>

  </div>

  <!-- 내 먹은패 -->

  <div class="section">

    <div class="sectionTitle">
      내가 먹은패
    </div>

    <!-- 1줄 -->
    <div
      class="captureRow"
      id="myBrightAnimal"
    ></div>

    <!-- 2줄 -->
    <div
      class="captureRow"
      id="myRibbon"
    ></div>

    <!-- 3줄 -->
    <div
      class="captureRow"
      id="myJunk"
    ></div>

  </div>

  <div id="winner"></div>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="app.js"></script>

</body>
</html>
