<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>GoStop</title>

<style>

body{
  margin:0;
  padding:0;
  background:#0b3d2e;
  color:white;
  font-family:sans-serif;
  overflow-x:hidden;
}

#top{
  position:sticky;
  top:0;
  z-index:999;
  background:#06281e;
  padding:10px;
}

#turnInfo{
  font-size:20px;
  font-weight:bold;
}

.section{
  padding:10px;
}

.row{
  display:flex;
  flex-wrap:nowrap;
  overflow-x:auto;
  overflow-y:hidden;
  padding-bottom:10px;
}

.card{
  width:60px;
  height:90px;
  object-fit:cover;
  border-radius:6px;
  margin-left:-18px;
  flex-shrink:0;
  border:2px solid white;
  background:white;
}

.row .card:first-child{
  margin-left:0;
}

#table{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}

#table .card{
  margin-left:0;
}

#controls{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:#06281e;
  padding:10px 0;
  z-index:9999;
}

button{
  border:none;
  border-radius:10px;
  padding:12px 20px;
  font-size:16px;
  font-weight:bold;
  background:#1f7a4c;
  color:white;
}

button:active{
  transform:scale(0.95);
}

@media (max-width:600px){
  .card{
    width:48px;
    height:72px;
  }
}

</style>
</head>

<body>

<div id="top">
  <div id="turnInfo">연결중...</div>
</div>

<div class="section">
  <h3>상대 먹은패</h3>
  <div id="opponentCaptured" class="row"></div>
</div>

<div class="section">
  <h3>테이블</h3>
  <div id="table"></div>
</div>

<div class="section">
  <h3>내 패</h3>
  <div id="hand" class="row"></div>
</div>

<div class="section">
  <h3>내 먹은패</h3>
  <div id="captured" class="row"></div>
</div>

<div style="height:90px;"></div>

<div id="controls">
  <button onclick="restartGame()">다시하기</button>
  <button onclick="leaveRoom()">나가기</button>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>

// =========================
// 서버 연결 (핵심 수정)
// =========================

// ❌ 기존: io("http://192.168...")
// ✅ 수정: 동일 origin 자동 연결 (배포/로컬 다 대응)
const socket = io();

const roomId = "room1";
let myId = "";

// =========================
// connect
// =========================

socket.on("connect", () => {
  myId = socket.id;

  console.log("connected:", myId);

  socket.emit("joinRoom", { roomId });
});

// =========================
// state update
// =========================

socket.on("stateUpdate", data => {

  // 🔥 핵심 수정: turn 비교 방식 변경
  const myRole = data.roles?.[myId];
  const isMyTurn = myRole === data.turn;

  document.getElementById("turnInfo").innerText =
    isMyTurn ? "🟢 내 턴" : "🔴 상대 턴";

  render(data);
});

// =========================
// 카드 생성
// =========================

function createCard(card){

  const img = document.createElement("img");

  // 🔥 핵심 수정: 이미지 경로
  img.src = "/cards/" + card;

  img.className = "card";

  img.onerror = () => {
    console.log("image fail:", card);
  };

  return img;
}

// =========================
// render root
// =========================

function render(data){

  renderHand(data.hands?.[myId] || []);
  renderTable(data.table || []);
  renderCaptured(data.captured?.[myId] || []);

  const opponentCards = [];

  Object.keys(data.captured || {}).forEach(id => {
    if (id !== myId) {
      opponentCards.push(...data.captured[id]);
    }
  });

  renderOpponent(opponentCards);
}

// =========================
// hand
// =========================

function renderHand(cards){

  const el = document.getElementById("hand");
  el.innerHTML = "";

  cards.forEach(card => {

    const img = createCard(card);

    img.onclick = () => {
      socket.emit("playCard", {
        roomId,
        card
      });
    };

    el.appendChild(img);
  });
}

// =========================
// table
// =========================

function renderTable(cards){

  const el = document.getElementById("table");
  el.innerHTML = "";

  cards.forEach(card => {
    el.appendChild(createCard(card));
  });
}

// =========================
// 내 먹은패
// =========================

function renderCaptured(cards){

  const el = document.getElementById("captured");
  el.innerHTML = "";

  cards.forEach(card => {
    el.appendChild(createCard(card));
  });
}

// =========================
// 상대 먹은패
// =========================

function renderOpponent(cards){

  const el = document.getElementById("opponentCaptured");
  el.innerHTML = "";

  cards.forEach(card => {
    el.appendChild(createCard(card));
  });
}

// =========================
// 버튼
// =========================

function restartGame(){
  socket.emit("restartGame", roomId);
}

function leaveRoom(){
  location.reload();
}

</script>

</body>
</html>
