<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>GoStop</title>

<style>

body{
  margin:0;
  padding:0;
  background:#0b3d2e;
  color:white;
  font-family:sans-serif;
  overflow-x:hidden;
}

#wrap{
  width:100%;
  max-width:100vw;
  overflow-x:hidden;
  padding-bottom:90px;
}

/* 상단 */

#top{
  position:sticky;
  top:0;
  background:#06281e;
  padding:10px;
  z-index:100;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

/* 영역 */

.section{
  padding:10px;
}

.section h3{
  margin:0 0 10px 0;
  font-size:18px;
}

/* 카드 영역 */

#table{
  display:flex;
  flex-wrap:wrap;
  gap:4px;
}

#hand,
#captured,
#opponentCaptured{
  display:flex;
  flex-wrap:nowrap;
  overflow-x:auto;
  overflow-y:hidden;
  padding-bottom:10px;
}

/* 카드 */

.card{
  width:60px;
  height:90px;
  object-fit:cover;
  border-radius:6px;
  background:white;
  flex-shrink:0;
}

/* 먹은패 겹치기 */

#captured .card,
#opponentCaptured .card{
  margin-left:-20px;
}

#captured .card:first-child,
#opponentCaptured .card:first-child{
  margin-left:0;
}

/* 내 패 */

#hand .card{
  margin-right:4px;
  cursor:pointer;
}

/* 버튼 */

#controls{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#06281e;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
  z-index:999;
}

button{
  border:none;
  border-radius:10px;
  padding:12px 24px;
  font-size:16px;
  font-weight:bold;
  background:#1f7a4c;
  color:white;
}

/* 모바일 */

@media (max-width:600px){

  .card{
    width:48px;
    height:72px;
  }

  #captured .card,
  #opponentCaptured .card{
    margin-left:-16px;
  }

}

</style>
</head>

<body>

<div id="wrap">

  <div id="top">
    <div id="turnInfo">
      연결중...
    </div>
  </div>

  <div class="section">
    <h3>상대 먹은패</h3>
    <div id="opponentCaptured"></div>
  </div>

  <div class="section">
    <h3>테이블</h3>
    <div id="table"></div>
  </div>

  <div class="section">
    <h3>내 패</h3>
    <div id="hand"></div>
  </div>

  <div class="section">
    <h3>내 먹은패</h3>
    <div id="captured"></div>
  </div>

</div>

<div id="controls">

  <button onclick="restartGame()">
    다시하기
  </button>

  <button onclick="leaveRoom()">
    나가기
  </button>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

const roomId = "room1";

socket.on("connect", () => {

  console.log(
    "socket connected:",
    socket.id
  );

  socket.emit(
    "joinRoom",
    roomId
  );
});

socket.on(
  "gameState",
  (data) => {

    const myId =
      socket.id;

    console.log(
      "ME:",
      myId
    );

    console.log(
      "TURN:",
      data.turn
    );

    const isMyTurn =
      data.turn === myId;

    document.getElementById(
      "turnInfo"
    ).innerText =

      isMyTurn
        ? "내 턴"
        : "상대 턴";

    render(
      data,
      myId
    );
  }
);

function playCard(card){

  socket.emit(
    "playCard",
    {
      room: roomId,
      card
    }
  );
}

function restartGame(){

  socket.emit(
    "restartGame",
    roomId
  );
}

function leaveRoom(){

  location.reload();
}

function render(
  data,
  myId
){

  renderHand(
    data.hands?.[myId] || []
  );

  renderTable(
    data.table || []
  );

  renderCaptured(
    data.captured?.[myId] || []
  );

  const opponentCards =

    Object.keys(
      data.captured || {}
    )
    .filter(
      id => id !== myId
    )
    .flatMap(
      id => data.captured[id]
    );

  renderOpponent(
    opponentCards
  );
}

function makeCard(card){

  const img =
    document.createElement("img");

  img.src =
    "images/" + card;

  img.className =
    "card";

  img.draggable = false;

  return img;
}

function renderHand(cards){

  const el =
    document.getElementById(
      "hand"
    );

  el.innerHTML = "";

  cards.forEach(card => {

    const img =
      makeCard(card);

    img.onclick =
      () => playCard(card);

    el.appendChild(img);
  });
}

function renderTable(cards){

  const el =
    document.getElementById(
      "table"
    );

  el.innerHTML = "";

  cards.forEach(card => {

    const img =
      makeCard(card);

    el.appendChild(img);
  });
}

function renderCaptured(cards){

  const el =
    document.getElementById(
      "captured"
    );

  el.innerHTML = "";

  cards.forEach(card => {

    const img =
      makeCard(card);

    el.appendChild(img);
  });
}

function renderOpponent(cards){

  const el =
    document.getElementById(
      "opponentCaptured"
    );

  el.innerHTML = "";

  cards.forEach(card => {

    const img =
      makeCard(card);

    el.appendChild(img);
  });
}

</script>

</body>
</html>
