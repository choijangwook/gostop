<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

const roomId = "room1";

let myId = null;
let myRole = null;

socket.on("connect", () => {

  myId = socket.id;

  socket.emit(
    "joinRoom",
    { roomId }
  );
});

socket.on(
  "stateUpdate",
  (data) => {

    myRole =
      data.roles[myId];

    const isMyTurn =
      myRole === data.turn;

    document.getElementById(
      "turnInfo"
    ).innerText =

      isMyTurn
        ? "내 턴"
        : "상대 턴";

    render(data);
  }
);

function playCard(card) {

  socket.emit(
    "playCard",
    {
      roomId,
      card
    }
  );
}

function restartGame() {

  socket.emit(
    "restart",
    { roomId }
  );
}

function leaveRoom() {

  socket.emit(
    "leaveRoom",
    { roomId }
  );

  location.reload();
}

function render(data) {

  renderHand(
    data.hands?.[myId] || []
  );

  renderTable(
    data.table || []
  );

  renderCaptured(
    data.captured?.[myId] || []
  );

  // 상대 먹은패

  const opponentCards =

    Object.keys(
      data.captured || {}
    )
    .filter(
      id => id !== myId
    )
    .flatMap(
      id => data.captured[id]
    );

  renderOpponent(
    opponentCards
  );
}

function makeCard(card) {

  const img =
    document.createElement("img");

  img.src =
    "images/" + card;

  img.className =
    "card";

  return img;
}

function renderHand(cards) {

  const el =
    document.getElementById(
      "hand"
    );

  el.innerHTML = "";

  cards.forEach(card => {

    const img =
      makeCard(card);

    img.onclick =
      () => playCard(card);

    el.appendChild(img);
  });
}

function renderTable(cards) {

  const el =
    document.getElementById(
      "table"
    );

  el.innerHTML = "";

  cards.forEach(card => {

    const img =
      makeCard(card);

    el.appendChild(img);
  });
}

function renderCaptured(cards) {

  const el =
    document.getElementById(
      "captured"
    );

  el.innerHTML = "";

  cards.forEach(card => {

    const img =
      makeCard(card);

    el.appendChild(img);
  });
}

function renderOpponent(cards) {

  const el =
    document.getElementById(
      "opponentCaptured"
    );

  el.innerHTML = "";

  cards.forEach(card => {

    const img =
      makeCard(card);

    el.appendChild(img);
  });
}

</script>
