<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GoStop</title>

<style>

body {
  margin: 0;
  padding: 0;
  overflow-x: hidden;
  font-family: sans-serif;
  background: #0b3d2e;
  color: white;
}

#wrap {
  width: 100%;
  max-width: 100vw;
  overflow-x: hidden;
}

/* 상단 정보 */
#top {
  padding: 10px;
  position: sticky;
  top: 0;
  background: #06281e;
  z-index: 10;
}

/* 버튼 고정 영역 */
#controls {
  position: fixed;
  bottom: 10px;
  left: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  z-index: 9999;
}

button {
  padding: 10px 14px;
  border: none;
  border-radius: 8px;
  background: #1f7a4c;
  color: white;
  font-weight: bold;
}

/* 영역 공통 */
.section {
  padding: 10px;
  overflow-x: hidden;
}

/* 카드 공통 */
.card {
  display: inline-block;
  width: 55px;
  height: 80px;
  margin: 2px;
  background: white;
  color: black;
  border-radius: 6px;
  text-align: center;
  line-height: 80px;
  font-size: 12px;
}

/* 손패 - 겹치기 핵심 */
#hand, #captured {
  display: flex;
  flex-wrap: nowrap;
  overflow-x: auto;
  padding-bottom: 10px;
}

#hand .card,
#captured .card {
  margin-left: -18px;   /* 👈 핵심: 겹치기 */
  flex-shrink: 0;
}

#hand .card:first-child,
#captured .card:first-child {
  margin-left: 0;
}

/* 테이블 */
#table {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

/* 모바일 안전 영역 */
@media (max-width: 600px) {
  .card {
    width: 45px;
    height: 70px;
    line-height: 70px;
    font-size: 11px;
  }
}

</style>
</head>

<body>

<div id="wrap">

  <div id="top">
    <div id="turnInfo">TURN</div>
  </div>

  <div class="section">
    <h3>상대 먹은패</h3>
    <div id="opponentCaptured"></div>
  </div>

  <div class="section">
    <h3>테이블</h3>
    <div id="table"></div>
  </div>

  <div class="section">
    <h3>내 패</h3>
    <div id="hand"></div>
  </div>

  <div class="section">
    <h3>내 먹은패</h3>
    <div id="captured"></div>
  </div>

</div>

<div id="controls">
  <button onclick="restartGame()">다시하기</button>
  <button onclick="leaveRoom()">나가기</button>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>

const socket = io("http://localhost:10000");

let roomId = "room1";
let roles = {};
let myRole = null;
let turn = null;
let isMyTurn = false;

socket.emit("joinRoom", { roomId });

socket.on("stateUpdate", (data) => {

  roles = data.roles || {};
  turn = data.turn;

  myRole = roles[socket.id];
  if (!myRole) return;

  isMyTurn = (myRole === turn);

  document.getElementById("turnInfo").innerText =
    `TURN: ${turn} | ME: ${myRole} | ${isMyTurn ? "내 턴" : "상대 턴"}`;

  render(data);
});

function playCard(card) {
  if (!isMyTurn) return;

  socket.emit("playCard", { roomId, card });
}

function restartGame() {
  socket.emit("restart", { roomId });
}

function leaveRoom() {
  socket.emit("leaveRoom", { roomId });
}

function render(data) {

  renderHand(data.hands?.[socket.id] || []);
  renderTable(data.table || []);
  renderCaptured(data.captured?.[socket.id] || []);

  // 상대 패
  const opp = Object.keys(data.roles || {})
    .filter(id => id !== socket.id)
    .map(id => data.captured[id] || [])
    .flat();

  renderOpponent(opp);
}

function renderHand(cards) {
  const el = document.getElementById("hand");
  el.innerHTML = "";

  cards.forEach(c => {
    const d = document.createElement("div");
    d.className = "card";
    d.innerText = c;
    d.onclick = () => playCard(c);
    el.appendChild(d);
  });
}

function renderTable(cards) {
  const el = document.getElementById("table");
  el.innerHTML = "";

  cards.forEach(c => {
    const d = document.createElement("div");
    d.className = "card";
    d.innerText = c;
    el.appendChild(d);
  });
}

function renderCaptured(cards) {
  const el = document.getElementById("captured");
  el.innerHTML = "";

  cards.forEach(c => {
    const d = document.createElement("div");
    d.className = "card";
    d.innerText = c;
    el.appendChild(d);
  });
}

function renderOpponent(cards) {
  const el = document.getElementById("opponentCaptured");
  el.innerHTML = "";

  cards.forEach(c => {
    const d = document.createElement("div");
    d.className = "card";
    d.innerText = c;
    el.appendChild(d);
  });
}

</script>

</body>
</html>
